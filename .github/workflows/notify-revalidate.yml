name: Notify Website

on:
  workflow_run:
    workflows: ["Set Timestamps"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger showcase sync
        run: |
          curl -sf -X POST "${{ secrets.SHOWCASE_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SHOWCASE_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"source": "showcase-repo"}'
