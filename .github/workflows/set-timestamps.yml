name: Set Timestamps

on:
  push:
    branches: [main]
    paths:
      - "projects/*.yaml"

permissions:
  contents: write

jobs:
  set-timestamps:
    runs-on: ubuntu-latest
    # Skip if this push was made by the timestamp bot itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get changed YAML files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'projects/*.yaml' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Set timestamps
        if: steps.changed.outputs.files != ''
        run: node .github/scripts/set-timestamps.ts ${{ steps.changed.outputs.files }}

      - name: Commit timestamps
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/
          git diff --staged --quiet || git commit -m "chore: set timestamps [skip ci]"
          git push
