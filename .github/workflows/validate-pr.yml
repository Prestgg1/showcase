name: Validate PR

on:
  pull_request:
    paths:
      - "projects/*.yaml"
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get changed YAML files
        id: changed
        run: |
          NEW=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD -- 'projects/*.yaml' | tr '\n' ' ')
          MODIFIED=$(git diff --name-only --diff-filter=M origin/${{ github.base_ref }}...HEAD -- 'projects/*.yaml' | tr '\n' ' ')
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "modified=$MODIFIED" >> "$GITHUB_OUTPUT"
          echo "has_files=$( [ -n \"$NEW$MODIFIED\" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Validate
        if: steps.changed.outputs.has_files == 'true'
        run: node .github/scripts/validate.ts --new ${{ steps.changed.outputs.new }} --modified ${{ steps.changed.outputs.modified }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
